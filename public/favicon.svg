<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#1e3a8a"/>
        </linearGradient>
    </defs>
    <rect width="100" height="100" rx="22" fill="url(#bg)"/>
    <g fill="#ffffff">
        <!-- Chimney -->
        <rect x="65" y="25" width="10" height="20" rx="1"/>
        <!-- Roof -->
        <polygon points="50,20 15,50 85,50"/>
        <!-- House body -->
        <rect x="22" y="50" width="56" height="40" rx="2"/>
    </g>
    <!-- Door -->
    <rect x="42" y="60" width="16" height="30" rx="2" fill="rgba(30,58,138,0.5)"/>
    <circle cx="54" cy="77" r="1.5" fill="#ffffff"/>
    <!-- Glowing windows -->
    <rect x="27" y="58" width="12" height="12" rx="1" fill="#fbbf24"/>
    <rect x="61" y="58" width="12" height="12" rx="1" fill="#fbbf24"/>
    <!-- Window frames -->
    <g stroke="rgba(30,58,138,0.6)" stroke-width="1">
        <line x1="33" y1="58" x2="33" y2="70"/>
        <line x1="27" y1="64" x2="39" y2="64"/>
        <line x1="67" y1="58" x2="67" y2="70"/>
        <line x1="61" y1="64" x2="73" y2="64"/>
    </g>
</svg>
