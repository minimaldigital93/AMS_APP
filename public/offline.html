<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline · AMS</title>
    <!--
        Served by the service worker as the navigation fallback. The document
        keeps the URL of the page the user tried to reach, so NO external asset
        reference (relative or root-relative) is reliable here — the logo is
        inlined and the page must stay fully self-contained.

        Static file = no __() available. Both languages are embedded; a tiny
        script picks Khmer when the app last ran in Khmer (ams_locale in
        localStorage, written by partials/pwa-head) or the device prefers it.
    -->
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            color: #1f2937;
            padding: 24px;
        }
        .card {
            max-width: 360px;
            text-align: center;
        }
        svg.logo { width: 96px; height: 96px; margin-bottom: 20px; }
        h1 { font-size: 1.25rem; margin: 0 0 8px; }
        p { color: #6b7280; line-height: 1.5; margin: 0 0 20px; }
        button {
            background: #3b82f6;
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button:hover { background: #2563eb; }
        [lang="km"] { display: none; }
        html.km [lang="km"] { display: block; }
        html.km [lang="en"] { display: none; }
        html.km button [lang="km"] { display: inline; }
    </style>
</head>
<body>
    <div class="card">
        <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AMS">
            <defs>
                <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#3b82f6"/>
                    <stop offset="100%" stop-color="#1e3a8a"/>
                </linearGradient>
            </defs>
            <rect width="100" height="100" rx="22" fill="url(#bg)"/>
            <g fill="#ffffff">
                <rect x="65" y="25" width="10" height="20" rx="1"/>
                <polygon points="50,20 15,50 85,50"/>
                <rect x="22" y="50" width="56" height="40" rx="2"/>
            </g>
            <rect x="42" y="60" width="16" height="30" rx="2" fill="rgba(30,58,138,0.5)"/>
            <circle cx="54" cy="77" r="1.5" fill="#ffffff"/>
            <rect x="27" y="58" width="12" height="12" rx="1" fill="#fbbf24"/>
            <rect x="61" y="58" width="12" height="12" rx="1" fill="#fbbf24"/>
            <g stroke="rgba(30,58,138,0.6)" stroke-width="1">
                <line x1="33" y1="58" x2="33" y2="70"/>
                <line x1="27" y1="64" x2="39" y2="64"/>
                <line x1="67" y1="58" x2="67" y2="70"/>
                <line x1="61" y1="64" x2="73" y2="64"/>
            </g>
        </svg>
        <h1 lang="en">You're offline</h1>
        <h1 lang="km">អ្នកកំពុងក្រៅបណ្ដាញ</h1>
        <p lang="en">It looks like you've lost your connection. Check your network and try again.</p>
        <p lang="km">មើលទៅអ្នកបានបាត់បង់ការតភ្ជាប់។ សូមពិនិត្យបណ្ដាញរបស់អ្នក ហើយព្យាយាមម្តងទៀត។</p>
        <button onclick="location.reload()">
            <span lang="en">Retry</span><span lang="km">ព្យាយាមម្តងទៀត</span>
        </button>
    </div>
    <script>
        (function () {
            var locale = '';
            try { locale = localStorage.getItem('ams_locale') || ''; } catch (e) {}
            if (!locale && navigator.language) locale = navigator.language;
            if (String(locale).toLowerCase().indexOf('km') === 0) {
                document.documentElement.classList.add('km');
                document.documentElement.setAttribute('lang', 'km');
            }
        })();
    </script>
</body>
</html>
