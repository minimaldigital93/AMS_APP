# =====================================================================
# DigitalOcean front door for minimaldigital.dev
# TLS terminates HERE using a Cloudflare Origin Certificate (mode: Full
# (strict)). Cloudflare proxies the public A record to this droplet.
#
#   /              -> "coming soon" placeholder
#   /ams_app/*     -> Laravel (AMS_APP) backend on 127.0.0.1:8000 (php-fpm)
#   /ams_app/build -> static Vite assets straight from public/build (cached)
#   /smart_sell/*  -> Next.js (Smart_sell) on 127.0.0.1:3000 (basePath kept)
#
# The /ams_app proxy strips the prefix (trailing slash on proxy_pass) and
# tells Laravel its public base path via X-Forwarded-Prefix, exactly like
# the old Mac+tunnel setup — so generated URLs keep /ams_app.
# Install at: /etc/nginx/sites-available/minimaldigital.dev
# =====================================================================

# HTTP -> HTTPS (Cloudflare already redirects, but redirect at origin too).
server {
    listen 80;
    listen [::]:80;
    server_name minimaldigital.dev www.minimaldigital.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name minimaldigital.dev www.minimaldigital.dev;

    # --- Cloudflare Origin Certificate -----------------------------------
    ssl_certificate     /etc/ssl/cloudflare/minimaldigital.dev.pem;
    ssl_certificate_key /etc/ssl/cloudflare/minimaldigital.dev.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    # Keep nginx-issued redirects relative so the real port never leaks and
    # the /ams_app prefix is preserved.
    absolute_redirect off;
    port_in_redirect off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # --- AMS_APP under /ams_app ------------------------------------------

    # Built Vite assets served straight from Laravel's public/build (cached).
    location ^~ /ams_app/build/ {
        alias /var/www/AMS_APP/public/build/;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Normalize the bare prefix.
    location = /ams_app {
        return 301 /ams_app/;
    }

    # Everything else under /ams_app: strip the prefix and forward to the
    # Laravel php-fpm backend, telling Laravel its base path via X-Forwarded-Prefix.
    location /ams_app/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Prefix /ams_app;
    }

    # --- Smart_sell under /smart_sell (Next.js basePath=/smart_sell) ------
    # No prefix strip: Next.js expects the /smart_sell path intact.
    location /smart_sell {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # --- Root placeholder -------------------------------------------------
    location = / {
        default_type text/html;
        return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>minimaldigital.dev</title><style>html,body{height:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;display:grid;place-items:center;background:#fafafa;color:#111}main{text-align:center}h1{font-weight:600;letter-spacing:-.02em}p{color:#666}</style></head><body><main><h1>minimaldigital.dev</h1><p>Website coming soon.</p></main></body></html>';
    }

    location / {
        return 404;
    }
}
