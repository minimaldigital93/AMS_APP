# =====================================================================
# AMS_APP (Laravel) backend — internal only, bound to 127.0.0.1:8000.
# This is the production replacement for `php artisan serve`: same address
# and same contract (serves the app at root), but via nginx + php-fpm.
# The public front door (do-minimaldigital.dev.conf) strips /ams_app and
# proxies here with X-Forwarded-Prefix /ams_app.
# Install at: /etc/nginx/sites-available/ams_app-backend
# =====================================================================
server {
    listen 127.0.0.1:8000;
    server_name _;
    root /var/www/AMS_APP/public;

    index index.php;
    charset utf-8;
    client_max_body_size 25m;

    # Trust the front door's forwarded scheme/prefix; keep redirects relative.
    absolute_redirect off;
    port_in_redirect off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny dotfiles except .well-known.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
