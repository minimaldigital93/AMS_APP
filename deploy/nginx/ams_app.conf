# minimaldigital.dev front door (behind the Cloudflare Tunnel).
#   /ams_app/*  -> AMS_APP (Laravel `php artisan serve` on :8000)
#   /           -> placeholder reserved for the future website
# Smart_sell (/smart_sell) is routed straight to :3000 by the tunnel and never
# reaches nginx.
server {
    listen 127.0.0.1:8090;
    server_name _;

    client_max_body_size 45m;

    # TLS terminates at the Cloudflare edge and the real port is hidden; keep
    # nginx-issued redirects relative so they never leak http://...:8090.
    absolute_redirect off;
    port_in_redirect off;

    # --- AMS_APP under /ams_app --------------------------------------------

    # Built Vite assets served straight from Laravel's public/build (cached).
    location ^~ /ams_app/build/ {
        alias /Users/sarotmoniodom/AMS_APP/public/build/;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Normalize the bare prefix.
    location = /ams_app {
        return 301 /ams_app/;
    }

    # Everything else under /ams_app: strip the prefix (trailing slash on
    # proxy_pass) and forward to `php artisan serve`, telling Laravel its public
    # base path via X-Forwarded-Prefix so generated URLs keep /ams_app.
    location /ams_app/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Prefix /ams_app;
    }

    # --- Reserved root for the upcoming website -----------------------------
    location = / {
        default_type text/html;
        return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>minimaldigital.dev</title><style>html,body{height:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;display:grid;place-items:center;background:#fafafa;color:#111}main{text-align:center}h1{font-weight:600;letter-spacing:-.02em}p{color:#666}</style></head><body><main><h1>minimaldigital.dev</h1><p>Website coming soon.</p></main></body></html>';
    }

    # Anything else not yet in use.
    location / {
        return 404;
    }
}
